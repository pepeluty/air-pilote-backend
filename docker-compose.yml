services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${PG_DB:-air-pilote}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["pg_isready", "-U", "${PG_USER:-postgres}", "-d", "${PG_DB:-air-pilote}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB:-air-pilote}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-prod-please-use-a-long-random-string}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  pg-data: