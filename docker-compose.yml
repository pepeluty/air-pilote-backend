services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${PG_DB:-air-pilote}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PG_USER:-postgres}", "-d", "${PG_DB:-air-pilote}"]
      interval: 5s
      timeout: 3s
      retries: 10
  
volumes:
  pg-data: